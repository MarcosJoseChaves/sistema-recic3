<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entrega de documentos · Finalização</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a href="{{ url_for('entrega_documentos', uvr=uvr_filtro, periodo_referencia=periodo_referencia, passo=1) }}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h3 class="d-inline ms-2">Entrega de documentos · Finalização</h3>
        </div>
        <span class="badge text-bg-dark">Etapa final</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <p class="mb-1"><strong>UVR:</strong> {{ uvr_filtro }}</p>
            <p class="mb-1"><strong>Período:</strong> {{ periodo_referencia }}</p>
            <p class="mb-1"><strong>Status do pacote:</strong> {{ pacote.status_envio }}</p>
            <p class="mb-3"><strong>Total de documentos no pacote:</strong> {{ total_itens }}</p>

            <div class="alert alert-info">
                Revise as informações. Ao finalizar, o pacote será enviado para auditoria.
            </div>

            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary" href="{{ url_for('entrega_documentos', uvr=uvr_filtro, periodo_referencia=periodo_referencia, passo=1) }}">
                    Voltar ao passo 1
                </a>
                <button class="btn btn-success" id="btnFinalizarEnvio">
                    <i class="fas fa-check-double"></i> Finalizar e enviar para auditoria
                </button>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('btnFinalizarEnvio').onclick = async () => {
    if (!confirm('Deseja finalizar o envio do pacote para auditoria?')) return;
    const res = await fetch('/entrega-documentos/passo1/finalizar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            uvr: {{ uvr_filtro|tojson }},
            periodo_referencia: {{ periodo_referencia|tojson }}
        })
    });
    const data = await res.json();
    alert(data.message || '');
    if (data.ok) {
        window.location.href = {{ url_for('entrega_documentos', uvr=uvr_filtro, periodo_referencia=periodo_referencia, passo=1)|tojson }};
    }
};
</script>
</body>
</html>
